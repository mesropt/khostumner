version: "3.9"

services:
  postgres:
    image: postgres:17
    env_file:
      - .env
    environment:
      POSTGRES_DB: khostumner
      POSTGRES_USER: khostumner
      POSTGRES_PASSWORD: khostumner
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khostumner -d khostumner"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             python -m app.services.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://khostumner:khostumner@postgres:5432/khostumner
      DB_ECHO: "false"
      ENVIRONMENT: development
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@khostumner.am
      JWT_SECRET: dev-jwt-secret-change-in-production
      RESET_PASSWORD_SECRET: dev-reset-secret-change-in-production
      VERIFICATION_SECRET: dev-verify-secret-change-in-production
      CSRF_SECRET: dev-csrf-secret-change-in-production
      COOKIE_SECURE: "false"
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
      - "24678:24678"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
