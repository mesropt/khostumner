# Nginx reverse proxy for Khostumner
#
# This file is mounted to /etc/nginx/conf.d/default.conf inside the nginx:alpine
# container. The alpine base image's nginx.conf includes conf.d/*.conf inside
# its http{} block — so this file runs at http context automatically.
#
# Bot user-agent routing (D-15, D-17):
# Known social-media crawlers are forwarded to the FastAPI OG endpoint which
# returns a minimal HTML page with <meta og:*> tags.
# Regular browsers receive the Vite SPA HTML shell.
#
# The `set` + double-if pattern is used instead of a top-level `map` directive
# because `map` must appear at http context level — using it here (included
# inside http{} via conf.d/) is valid, but the double-if is simpler and avoids
# potential context-ordering concerns.

server {
    listen 80;

    # Promise detail pages: route bot user-agents to OG endpoint, SPA otherwise
    location ~* ^/promises/(.+)$ {
        set $backend_proxy 0;

        if ($http_user_agent ~* "(Facebookbot|Twitterbot|TelegramBot|LinkedInBot|Googlebot)") {
            set $backend_proxy 1;
        }

        if ($backend_proxy = 1) {
            proxy_pass http://backend:8000/api/og/promises/$1;
            break;
        }

        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # All other routes go to the Vite SPA
    # Includes: /, /fulfilled, /unfulfilled, /about, /persons/*, /parties/*, /elections/*
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
